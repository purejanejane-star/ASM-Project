<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Explorer — React Demo</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1f2d45;
      --accent: #38bdf8;
      --accent2: #818cf8;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Sora', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(56,189,248,0.08), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(129,140,248,0.06), transparent);
    }

    #root { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* HEADER */
    .header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .header p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .badge {
      margin-left: auto; font-family: var(--mono); font-size: 0.7rem;
      padding: 4px 10px; border-radius: 99px;
      background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.3);
      color: var(--accent); white-space: nowrap;
    }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; }
    .tab {
      font-family: var(--sans); font-size: 0.8rem; font-weight: 600;
      padding: 8px 16px; border-radius: 8px; border: 1px solid transparent;
      cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted);
    }
    .tab:hover { color: var(--text); background: var(--surface); }
    .tab.active {
      background: var(--surface2); border-color: var(--border);
      color: var(--accent);
    }

    /* CARD */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; margin-bottom: 1rem;
    }

    /* REQUEST BUILDER */
    .request-bar {
      display: flex; gap: 8px; padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .method-select {
      font-family: var(--mono); font-size: 0.8rem; font-weight: 600;
      padding: 0 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--yellow); cursor: pointer;
      outline: none; min-width: 90px;
    }
    .url-input {
      flex: 1; font-family: var(--mono); font-size: 0.82rem;
      padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .url-input:focus { border-color: rgba(56,189,248,0.5); }
    .url-input::placeholder { color: var(--muted); }

    .send-btn {
      font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
      padding: 0 20px; border-radius: 8px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #0ea5e9);
      color: #0b0f1a; transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.98); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* BODY INPUT */
    .body-section { padding: 1rem; border-bottom: 1px solid var(--border); }
    .body-label {
      font-size: 0.72rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }
    .body-textarea {
      width: 100%; font-family: var(--mono); font-size: 0.8rem;
      padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); outline: none;
      resize: vertical; min-height: 80px; transition: border-color 0.2s;
    }
    .body-textarea:focus { border-color: rgba(129,140,248,0.5); }

    /* RESPONSE */
    .response-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 1rem; border-bottom: 1px solid var(--border);
    }
    .status-pill {
      font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
      padding: 3px 10px; border-radius: 99px;
    }
    .status-2xx { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
    .status-4xx { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .status-err { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
    .response-time { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-left: auto; }

    .response-body {
      padding: 1rem; font-family: var(--mono); font-size: 0.78rem;
      line-height: 1.7; color: #94d8fb; max-height: 360px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    .response-body.empty { color: var(--muted); font-style: italic; }

    /* PRESETS */
    .presets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .preset-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .preset-card:hover { border-color: rgba(56,189,248,0.4); transform: translateY(-1px); }
    .preset-name { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .preset-url { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preset-method { display: inline-block; font-family: var(--mono); font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; }
    .get { background: rgba(74,222,128,0.15); color: var(--green); }
    .post-badge { background: rgba(251,191,36,0.15); color: var(--yellow); }

    /* HISTORY */
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-item:hover { border-color: rgba(56,189,248,0.3); }
    .history-method { font-family: var(--mono); font-size: 0.72rem; font-weight: 700; min-width: 40px; }
    .history-url { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-status { font-family: var(--mono); font-size: 0.7rem; margin-left: auto; }
    .h-green { color: var(--green); }
    .h-red { color: var(--red); }

    .empty-state {
      padding: 2.5rem 1rem; text-align: center;
      color: var(--muted); font-size: 0.85rem;
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 8px; }

    /* LOADER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(56,189,248,0.3); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    @media (max-width: 600px) {
      .request-bar { flex-wrap: wrap; }
      .method-select { min-width: 80px; }
      .presets-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

const PRESETS = [
  { name: "Users List", method: "GET", url: "https://jsonplaceholder.typicode.com/users" },
  { name: "Single Post", method: "GET", url: "https://jsonplaceholder.typicode.com/posts/1" },
  { name: "All Posts", method: "GET", url: "https://jsonplaceholder.typicode.com/posts?_limit=5" },
  { name: "Create Post", method: "POST", url: "https://jsonplaceholder.typicode.com/posts", body: JSON.stringify({ title: "Hello World", body: "This is a test post", userId: 1 }, null, 2) },
  { name: "Comments", method: "GET", url: "https://jsonplaceholder.typicode.com/comments?postId=1" },
  { name: "Todos", method: "GET", url: "https://jsonplaceholder.typicode.com/todos?_limit=5" },
];

function formatJson(str) {
  try { return JSON.stringify(JSON.parse(str), null, 2); }
  catch { return str; }
}

function App() {
  const [tab, setTab] = useState("request");
  const [method, setMethod] = useState("GET");
  const [url, setUrl] = useState("https://jsonplaceholder.typicode.com/users");
  const [body, setBody] = useState("");
  const [response, setResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState([]);

  const sendRequest = useCallback(async () => {
    if (!url.trim()) return;
    setLoading(true);
    setResponse(null);
    const start = Date.now();
    try {
      const opts = { method };
      if (["POST","PUT","PATCH"].includes(method) && body) {
        opts.headers = { "Content-Type": "application/json" };
        opts.body = body;
      }
      const res = await fetch(url, opts);
      const elapsed = Date.now() - start;
      const text = await res.text();
      const formatted = formatJson(text);
      const entry = { method, url, status: res.status, time: elapsed };
      setResponse({ status: res.status, data: formatted, time: elapsed });
      setHistory(h => [entry, ...h].slice(0, 10));
    } catch (err) {
      const elapsed = Date.now() - start;
      setResponse({ status: "ERR", data: err.message, time: elapsed });
      setHistory(h => [{ method, url, status: "ERR", time: elapsed }, ...h].slice(0, 10));
    } finally {
      setLoading(false);
    }
  }, [url, method, body]);

  const loadPreset = (p) => {
    setMethod(p.method);
    setUrl(p.url);
    setBody(p.body || "");
    setTab("request");
  };

  const loadHistory = (h) => {
    setMethod(h.method);
    setUrl(h.url);
    setTab("request");
  };

  const statusClass = (s) => {
    if (s === "ERR") return "status-pill status-err";
    if (s >= 200 && s < 300) return "status-pill status-2xx";
    return "status-pill status-4xx";
  };

  return (
    <div>
      {/* HEADER */}
      <div className="header">
        <div className="header-icon">🔌</div>
        <div>
          <h1>API Explorer</h1>
          <p>React JS + REST API Demo</p>
        </div>
        <div className="badge">React 18 • CDN</div>
      </div>

      {/* TABS */}
      <div className="tabs">
        {["request","presets","history"].map(t => (
          <button key={t} className={`tab ${tab===t?"active":""}`} onClick={()=>setTab(t)}>
            {{ request:"⚡ Request", presets:"📦 Presets", history:"🕐 History" }[t]}
          </button>
        ))}
      </div>

      {/* REQUEST TAB */}
      {tab === "request" && (
        <>
          <div className="card">
            <div className="request-bar">
              <select className="method-select" value={method} onChange={e=>setMethod(e.target.value)}>
                {["GET","POST","PUT","PATCH","DELETE"].map(m=>(
                  <option key={m} value={m}>{m}</option>
                ))}
              </select>
              <input
                className="url-input"
                type="text"
                placeholder="https://api.example.com/endpoint"
                value={url}
                onChange={e=>setUrl(e.target.value)}
                onKeyDown={e=>e.key==="Enter" && sendRequest()}
              />
              <button className="send-btn" onClick={sendRequest} disabled={loading}>
                {loading ? <span className="spinner" /> : "Send →"}
              </button>
            </div>

            {["POST","PUT","PATCH"].includes(method) && (
              <div className="body-section">
                <div className="body-label">Request Body (JSON)</div>
                <textarea
                  className="body-textarea"
                  placeholder='{ "key": "value" }'
                  value={body}
                  onChange={e=>setBody(e.target.value)}
                />
              </div>
            )}

            {/* RESPONSE */}
            {response ? (
              <>
                <div className="response-header">
                  <span style={{fontSize:"0.75rem",color:"var(--muted)"}}>Response</span>
                  <span className={statusClass(response.status)}>{response.status}</span>
                  <span className="response-time">{response.time}ms</span>
                </div>
                <pre className="response-body">{response.data}</pre>
              </>
            ) : (
              <div className="empty-state">
                <div className="icon">📡</div>
                <div>Kirim request untuk melihat response</div>
              </div>
            )}
          </div>
        </>
      )}

      {/* PRESETS TAB */}
      {tab === "presets" && (
        <div className="presets-grid">
          {PRESETS.map((p,i) => (
            <div key={i} className="preset-card" onClick={()=>loadPreset(p)}>
              <div className={`preset-method ${p.method==="GET"?"get":"post-badge"}`}>{p.method}</div>
              <div className="preset-name">{p.name}</div>
              <div className="preset-url">{p.url.replace("https://","")}</div>
            </div>
          ))}
        </div>
      )}

      {/* HISTORY TAB */}
      {tab === "history" && (
        history.length === 0 ? (
          <div className="empty-state">
            <div className="icon">🕐</div>
            <div>Belum ada history request</div>
          </div>
        ) : (
          <div className="history-list">
            {history.map((h,i) => (
              <div key={i} className="history-item" onClick={()=>loadHistory(h)}>
                <span className="history-method" style={{color: h.method==="GET"?"var(--green)":"var(--yellow)"}}>{h.method}</span>
                <span className="history-url">{h.url}</span>
                <span className={`history-status ${h.status>=200&&h.status<300?"h-green":"h-red"}`}>{h.status}</span>
                <span style={{fontFamily:"var(--mono)",fontSize:"0.7rem",color:"var(--muted)",marginLeft:"8px"}}>{h.time}ms</span>
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>

</html>
